      <path d="M 5 0 L 0 0 0 5" fill="none" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="0.52"/>
    </pattern>
    <pattern id="major" width="30" height="30" patternUnits="userSpaceOnUse">
