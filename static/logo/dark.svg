<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60" role="img" aria-label="Hoox">
  <!-- Brand mark: green rounded square with white H (same as light variant) -->
  <rect x="8" y="10" width="40" height="40" rx="8" fill="#0D9373"/>
  <g fill="#FFFFFF">
    <rect x="15" y="18" width="5" height="24" rx="1.2"/>
    <rect x="36" y="18" width="5" height="24" rx="1.2"/>
    <rect x="20" y="27.5" width="16" height="5" rx="1.2"/>
  </g>
  <!-- Wordmark: light green for dark-mode visibility -->
  <text x="60" y="40"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="700" fill="#55D799" letter-spacing="-0.5">hoox</text>
  <!-- Tagline -->
  <text x="142" y="40"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="500" fill="#9CA3AF">.sh</text>
</svg>
