asyncapi: 3.0.0
info:
  title: Hoox Event-Driven Architecture
  version: 1.0.0
  description: |
    Event-driven message flows powering the Hoox algorithmic trading
    platform on the Cloudflare edge.

    Covers Cloudflare Service Bindings (V8 worker-to-worker calls),
    Queues (async trade execution), Cron triggers (AI risk assessment),
    Durable Objects (idempotency), and Email Routing (signal parsing).

    **Worker Topology:**

    ```
    External → hoox (Gateway) ──→ trade-worker ──→ d1-worker
                                ──→ telegram-worker
                                ──→ web3-wallet-worker
                    agent-worker ──→ trade-worker, telegram-worker, d1-worker
                    email-worker ──→ trade-worker
                    dashboard ──→ d1-worker, agent-worker
    ```

servers:
  production:
    host: cloudflare-workers
    protocol: cloudflare-workers
    description: Cloudflare Workers edge runtime with V8 Service Bindings
  queue:
    host: cloudflare-queues
    protocol: cloudflare-queues
    description: Cloudflare Queues for asynchronous message delivery

defaultContentType: application/json

channels:
  TradeWebhook:
    address: /webhook
    title: Trade signal webhook
    description: |
      Incoming trade signals from TradingView, cURL, or any HTTP client.
      Received by the hoox gateway, validated, and forwarded to the
      execution engine.
    messages:
      WebhookSignal:
        $ref: "#/components/messages/WebhookSignal"
    operations:
      receiveSignal:
        action: receive
        title: Receive trade signal
        summary: Gateway receives external trade signal via HTTP POST
        channel:
          $ref: "#/channels/TradeWebhook"
        messages:
          - $ref: "#/channels/TradeWebhook/messages/WebhookSignal"

  TradeExecution:
    address: trade-worker
    title: Trade execution
    description: |
      Service binding call from gateway (or email-worker) to trade-worker
      for synchronous trade execution.
    messages:
      TradeRequest:
        $ref: "#/components/messages/TradeRequest"
    operations:
      executeTrade:
        action: send
        title: Forward trade for execution
        summary: Gateway sends validated trade to trade-worker via service binding
        channel:
          $ref: "#/channels/TradeExecution"
        messages:
          - $ref: "#/channels/TradeExecution/messages/TradeRequest"
      processTradeFromEmail:
        action: send
        title: Forward parsed email signal
        summary: Email-worker sends parsed trade signal to trade-worker
        channel:
          $ref: "#/channels/TradeExecution"
        messages:
          - $ref: "#/channels/TradeExecution/messages/TradeRequest"

  TradeQueue:
    address: TRADE_QUEUE
    title: Trade execution queue
    description: |
      Cloudflare Queue for asynchronous trade execution. Three modes
      controlled by KV config: queue_everywhere, queue_failover (default),
      or queue_disabled.
    messages:
      QueuedTrade:
        $ref: "#/components/messages/QueuedTrade"
    operations:
      enqueueTrade:
        action: send
        title: Enqueue trade for async execution
        summary: Gateway sends trade to queue instead of direct service call
        channel:
          $ref: "#/channels/TradeQueue"
        messages:
          - $ref: "#/channels/TradeQueue/messages/QueuedTrade"
      dequeueTrade:
        action: receive
        title: Process queued trade
        summary: Trade-worker consumer processes enqueued trades
        channel:
          $ref: "#/channels/TradeQueue"
        messages:
          - $ref: "#/channels/TradeQueue/messages/QueuedTrade"

  DatabaseQuery:
    address: d1-worker
    title: D1 database operations
    description: |
      Parameterized SQL queries and batch statements executed against
      Cloudflare D1 (SQLite at the edge). Accessed via service binding
      from trade-worker, agent-worker, and dashboard.
    messages:
      SqlQuery:
        $ref: "#/components/messages/SqlQuery"
      SqlBatch:
        $ref: "#/components/messages/SqlBatch"
    operations:
      querySingle:
        action: send
        title: Execute single SQL query
        channel:
          $ref: "#/channels/DatabaseQuery"
        messages:
          - $ref: "#/channels/DatabaseQuery/messages/SqlQuery"
      queryBatch:
        action: send
        title: Execute batch SQL statements
        channel:
          $ref: "#/channels/DatabaseQuery"
        messages:
          - $ref: "#/channels/DatabaseQuery/messages/SqlBatch"

  TelegramNotification:
    address: telegram-worker
    title: Telegram notifications
    description: |
      Push notifications sent to Telegram via the Hoox bot. Triggered by
      the gateway, agent-worker, web3-wallet-worker, and report-worker
      via service binding.
    messages:
      TelegramAlert:
        $ref: "#/components/messages/TelegramAlert"
    operations:
      sendAlertFromGateway:
        action: send
        title: Send trade notification
        summary: Gateway sends trade confirmation to Telegram
        channel:
          $ref: "#/channels/TelegramNotification"
        messages:
          - $ref: "#/channels/TelegramNotification/messages/TelegramAlert"
      sendAlertFromAgent:
        action: send
        title: Send risk alert
        summary: Agent-worker sends risk assessment alerts to Telegram
        channel:
          $ref: "#/channels/TelegramNotification"
        messages:
          - $ref: "#/channels/TelegramNotification/messages/TelegramAlert"
      sendAlertFromWallet:
        action: send
        title: Send wallet notification
        summary: Web3-wallet-worker sends DeFi operation results to Telegram
        channel:
          $ref: "#/channels/TelegramNotification"
        messages:
          - $ref: "#/channels/TelegramNotification/messages/TelegramAlert"
      sendAlertFromReport:
        action: send
        title: Send report notification
        summary: Report-worker sends PDF report delivery notification to Telegram
        channel:
          $ref: "#/channels/TelegramNotification"
        messages:
          - $ref: "#/channels/TelegramNotification/messages/TelegramAlert"
      receiveAlert:
        action: receive
        title: Receive notification request
        summary: Telegram-worker receives and dispatches notification
        channel:
          $ref: "#/channels/TelegramNotification"
        messages:
          - $ref: "#/channels/TelegramNotification/messages/TelegramAlert"

  WalletOperation:
    address: web3-wallet-worker
    title: DeFi wallet operations
    description: |
      On-chain EVM operations — swaps, balance checks, approvals —
      proxied from the gateway through service binding.
    messages:
      DexSwap:
        $ref: "#/components/messages/DexSwap"
    operations:
      executeWalletOp:
        action: send
        title: Execute wallet operation
        summary: Gateway forwards /wallet/* requests to web3-wallet-worker
        channel:
          $ref: "#/channels/WalletOperation"
        messages:
          - $ref: "#/channels/WalletOperation/messages/DexSwap"

  RiskAssessment:
    address: agent-worker
    title: AI risk management
    description: |
      Scheduled AI-powered risk analysis running every 5 minutes via cron
      trigger. Analyzes positions, market conditions, and adjusts trailing
      stops. Also handles on-demand chat and embedding requests.
    messages:
      RiskOverride:
        $ref: "#/components/messages/RiskOverride"
      AgentConfig:
        $ref: "#/components/messages/AgentConfig"
      AiChatRequest:
        $ref: "#/components/messages/AiChatRequest"
      EmbeddingRequest:
        $ref: "#/components/messages/EmbeddingRequest"
    operations:
      scheduledRiskCheck:
        action: receive
        title: Scheduled risk assessment
        summary: 5-minute cron trigger for automated risk analysis
        channel:
          $ref: "#/channels/RiskAssessment"
        messages:
          - $ref: "#/channels/RiskAssessment/messages/RiskOverride"
      chatWithAI:
        action: receive
        title: AI chat session
        summary: Conversational AI request from dashboard or CLI
        channel:
          $ref: "#/channels/RiskAssessment"
        messages:
          - $ref: "#/channels/RiskAssessment/messages/AiChatRequest"
      generateEmbedding:
        action: receive
        title: Generate text embedding
        summary: Vector embedding request from dashboard or automation
        channel:
          $ref: "#/channels/RiskAssessment"
        messages:
          - $ref: "#/channels/RiskAssessment/messages/EmbeddingRequest"

  IdempotencyStore:
    address: IDEMPOTENCY_STORE
    title: Idempotency Durable Object
    description: |
      Durable Object that maintains a 24-hour lock on processed trade
      keys to prevent duplicate execution. Accessed via RPC from the
      gateway's logic layer.
    messages:
      IdempotencyKey:
        $ref: "#/components/messages/IdempotencyKey"
    operations:
      checkIdempotency:
        action: receive
        title: Check and store idempotency key
        summary: Durable Object RPC call to verify trade uniqueness
        channel:
          $ref: "#/channels/IdempotencyStore"
        messages:
          - $ref: "#/channels/IdempotencyStore/messages/IdempotencyKey"

  EmailParsing:
    address: email-worker
    title: Email signal parsing
    description: |
      Parses incoming trade signals from forwarded emails. Uses
      Cloudflare Email Routing to receive and process messages,
      then forwards parsed signals to trade-worker.
    messages:
      EmailSignal:
        $ref: "#/components/messages/EmailSignal"
    operations:
      receiveEmail:
        action: receive
        title: Receive incoming email
        summary: Email-worker receives forwarded email with trade signal
        channel:
          $ref: "#/channels/EmailParsing"
        messages:
          - $ref: "#/channels/EmailParsing/messages/EmailSignal"
      forwardParsedSignal:
        action: send
        title: Forward parsed signal to execution
        summary: Email-worker sends parsed trade to trade-worker
        channel:
          $ref: "#/channels/EmailParsing"
        messages:
          - $ref: "#/channels/EmailParsing/messages/EmailSignal"

  AnalyticsTracking:
    address: analytics-worker
    title: Analytics and reporting
    description: |
      Usage and performance analytics aggregation. Receives events from
      all workers for dashboard metrics and billing.
    messages:
      AnalyticsEvent:
        $ref: "#/components/messages/AnalyticsEvent"
    operations:
      trackApiCall:
        action: send
        title: Track API call metric
        summary: Workers emit analytics events after processing requests
        channel:
          $ref: "#/channels/AnalyticsTracking"
        messages:
          - $ref: "#/channels/AnalyticsTracking/messages/AnalyticsEvent"

  PDFReport:
    address: report-worker
    title: PDF report generation
    description: |
      Generates PDF trade reports using Cloudflare Browser Rendering
      API. Triggered on demand via service binding from the dashboard
      or CLI.
    messages:
      ReportRequest:
        $ref: "#/components/messages/ReportRequest"
    operations:
      generateReport:
        action: receive
        title: Generate PDF report
        summary: Report-worker renders and returns a PDF document
        channel:
          $ref: "#/channels/PDFReport"
        messages:
          - $ref: "#/channels/PDFReport/messages/ReportRequest"

components:
  messages:
    WebhookSignal:
      name: WebhookSignal
      title: Webhook trade signal
      summary: Incoming trade signal from external webhook source
      contentType: application/json
      payload:
        type: object
        required:
          - apiKey
          - exchange
          - action
          - symbol
          - quantity
        properties:
          apiKey:
            type: string
            description: Webhook authentication key
          exchange:
            type: string
            enum: [binance, bybit, mexc]
            description: Target exchange
          action:
            type: string
            enum: [LONG, SHORT, CLOSE_LONG, CLOSE_SHORT]
            description: Trade action
          symbol:
            type: string
            maxLength: 20
            description: Trading pair
          quantity:
            type: number
            description: Order size
          price:
            type: number
            description: Optional limit price
          leverage:
            type: integer
            description: Optional margin leverage
          notify:
            type: object
            description: Optional Telegram notification
            properties:
              chatId:
                type: string
              message:
                type: string

    TradeRequest:
      name: TradeRequest
      title: Trade execution request
      summary: Internal trade payload forwarded to trade-worker
      contentType: application/json
      payload:
        type: object
        required:
          - requestId
          - exchange
          - action
          - symbol
          - quantity
        properties:
          requestId:
            type: string
            format: uuid
            description: Distributed trace ID
          exchange:
            type: string
            description: Target exchange
          action:
            type: string
            description: Trade action
          symbol:
            type: string
            description: Trading pair
          quantity:
            type: number
            description: Order size
          price:
            type: number
            description: Optional limit price
          leverage:
            type: integer
            description: Optional margin leverage

    QueuedTrade:
      name: QueuedTrade
      title: Queued trade message
      summary: Trade message enqueued via Cloudflare Queue
      contentType: application/json
      payload:
        type: object
        required:
          - requestId
          - exchange
          - action
          - symbol
          - quantity
          - queuedAt
        properties:
          requestId:
            type: string
            format: uuid
          exchange:
            type: string
          action:
            type: string
          symbol:
            type: string
          quantity:
            type: number
          price:
            type: number
          leverage:
            type: integer
          queuedAt:
            type: string
            format: date-time
            description: ISO-8601 timestamp of when the message was queued

    SqlQuery:
      name: SqlQuery
      title: D1 SQL query
      summary: Parameterized SQL query for D1 database
      contentType: application/json
      payload:
        type: object
        required:
          - query
        properties:
          requestId:
            type: string
            format: uuid
            description: Distributed trace ID
          query:
            type: string
            description: Parameterized SQL statement
          params:
            type: array
            items:
              type: string
            description: SQL parameter bindings

    SqlBatch:
      name: SqlBatch
      title: D1 SQL batch
      summary: Multiple parameterized SQL statements in a transaction
      contentType: application/json
      payload:
        type: object
        required:
          - queries
        properties:
          requestId:
            type: string
            format: uuid
          queries:
            type: array
            items:
              $ref: "#/components/messages/SqlQuery/payload"

    TelegramAlert:
      name: TelegramAlert
      title: Telegram notification
      summary: Push notification delivered via Telegram bot
      contentType: application/json
      payload:
        type: object
        required:
          - message
          - chatId
        properties:
          requestId:
            type: string
            format: uuid
          message:
            type: string
            description: Formatted message content (supports HTML/Markdown)
          chatId:
            type: string
            description: Target Telegram chat ID
          parseMode:
            type: string
            enum: [HTML, MarkdownV2]
            description: Message formatting mode

    DexSwap:
      name: DexSwap
      title: DEX swap operation
      summary: On-chain DeFi swap or token operation
      contentType: application/json
      payload:
        type: object
        required:
          - chain
          - to
          - value
          - data
        properties:
          chain:
            type: string
            enum: [ethereum, arbitrum, polygon]
            description: EVM-compatible chain
          to:
            type: string
            description: Recipient or contract address
          value:
            type: string
            description: Transaction value in wei (string)
          data:
            type: string
            description: Encoded contract call data
          gasLimit:
            type: integer
            description: Optional gas limit override

    RiskOverride:
      name: RiskOverride
      title: Risk override
      summary: AI agent trailing stop override
      contentType: application/json
      payload:
        type: object
        properties:
          trailingStopPercent:
            type: number
            minimum: 0
            maximum: 100
            description: Global trailing stop percentage override

    AgentConfig:
      name: AgentConfig
      title: Agent configuration
      summary: AI agent configuration update
      contentType: application/json
      payload:
        type: object
        properties:
          defaultProvider:
            type: string
            enum: [workers-ai, openai, anthropic, google]
          fallbackChain:
            type: array
            items:
              type: string
          modelMap:
            type: object
            description: Provider-to-model mapping overrides

    AiChatRequest:
      name: AiChatRequest
      title: AI chat request
      summary: Multi-provider AI chat request
      contentType: application/json
      payload:
        type: object
        properties:
          prompt:
            type: string
            description: Chat prompt
          stream:
            type: boolean
            description: Enable streaming response
          provider:
            type: string
            enum: [openai, anthropic, workers-ai, google]
            description: AI provider to use

    EmbeddingRequest:
      name: EmbeddingRequest
      title: Embedding generation request
      summary: Generate text embeddings via Workers AI
      contentType: application/json
      payload:
        type: object
        required:
          - text
        properties:
          text:
            type: string
            minLength: 1
            maxLength: 10000
            description: Text to embed
          provider:
            type: string
            description: Optional provider override

    IdempotencyKey:
      name: IdempotencyKey
      title: Idempotency key
      summary: Trade idempotency check key
      contentType: text/plain
      payload:
        type: string
        description: "Format: trade:{exchange}:{symbol}:{action}:{quantity}"

    EmailSignal:
      name: EmailSignal
      title: Email trade signal
      summary: Trade signal parsed from forwarded email
      contentType: application/json
      payload:
        type: object
        properties:
          from:
            type: string
            format: email
            description: Sender email address
          subject:
            type: string
            description: Email subject line
          body:
            type: string
            description: Raw email body
          parsedSignal:
            type: object
            description: Extracted trade parameters
            properties:
              exchange:
                type: string
              action:
                type: string
              symbol:
                type: string
              quantity:
                type: number

    AnalyticsEvent:
      name: AnalyticsEvent
      title: Analytics event
      summary: Usage and performance metric
      contentType: application/json
      payload:
        type: object
        properties:
          worker:
            type: string
            description: Source worker name
          endpoint:
            type: string
            description: API endpoint path
          latencyMs:
            type: integer
            description: Request processing time
          success:
            type: boolean
            description: Whether the operation succeeded

    ReportRequest:
      name: ReportRequest
      title: PDF report request
      summary: Generate a PDF trade report via Browser Rendering
      contentType: application/json
      payload:
        type: object
        properties:
          requestId:
            type: string
            format: uuid
          format:
            type: string
            enum: [pdf]
            description: Output format
          dateRange:
            type: object
            properties:
              start:
                type: string
                format: date-time
                description: Report start date
              end:
                type: string
                format: date-time
                description: Report end date
