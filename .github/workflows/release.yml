name: Release to npm and GitHub Packages

on:
  push:
    tags:
      - 'v0.*'
      - 'v1.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test packages/hoox-cli

      - name: Build project
        run: bun run build

      # ===== Publish to npm =====
      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --workspaces --if-present --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ===== Publish to GitHub Packages =====
      # - name: Setup Node.js for GitHub Packages
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #     registry-url: https://npm.pkg.github.com

      # - name: Publish to GitHub Packages
      #   run: |
      #     npm config set @hoox:registry https://npm.pkg.github.com/
      #     npm publish --workspaces --if-present
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false