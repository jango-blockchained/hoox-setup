# Secret Scanning Workflow
# Runs gitleaks to detect hardcoded secrets (API keys, tokens, passwords)
# in the repository. Findings are informational and don't block CI.
#
# Triggered:
#   - On push/PR to main
#   - On push/PR to develop
#   - Weekly on Sunday

name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed for gitleaks PR comment annotations
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full git history required for gitleaks to scan all commits
          fetch-depth: 0

      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        # Informational only — findings don't block CI
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
