name: Shared Package CI

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/shared/**"
      - ".github/workflows/shared-package-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/shared/**"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        # Required before typecheck: `exports` map points at `dist/*.d.ts`,
        # so consumers (dashboard, etc.) need a built dist to resolve types.
        # Without this, `tsc --noEmit` fails with TS2307 for every consumer
        # of `@jango-blockchained/hoox-shared/<sub>` since PR #109.
        run: cd packages/shared && bun run build

      - name: Run ESLint for shared package
        run: bun run lint

      - name: Run TypeScript type check for shared package
        run: bun run typecheck

  test:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests for shared package
        run: bun test packages/shared --coverage || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          threshold: 80
          flags: shared-package
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build:shared

      - name: Verify dist output
        run: |
          ls -la packages/shared/dist/index.js
          ls -la packages/shared/dist/index.d.ts
          echo "Shared package build verified ✓"
