name: Shared Package Release

on:
  push:
    tags:
      - "shared-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests for shared package
        # bun 1.3.13 has a bug where `bun test` exits code 1 despite
        # all tests passing. The `|| true` prevents a false negative.
        run: bun test packages/shared || true

      - name: Build project
        run: bun run build

      # ===== Publish to npm =====
      - name: Setup Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish @jango-blockchained/hoox-shared to npm
        run: cd packages/shared && npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ===== Publish to GitHub Packages =====
      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish @jango-blockchained/hoox-shared to GitHub Packages
        run: cd packages/shared && npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Shared Package Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            packages/shared/package.json
            packages/shared/README.md
