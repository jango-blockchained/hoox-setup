# =============================================================================
# Build and push the Hoox production Docker image to GHCR via Buildx Bake.
#
# Triggers:
#   - push to main          → :main + :sha-<short>  (continuous tip)
#   - v0.* / v1.* tags      → :<semver> + :latest + :sha-<short>
#   - workflow_dispatch     → manual rebuild (optional version / platforms)
#
# Image source : docker-bake.hcl → target "prod" (Dockerfile.prod)
# Image target : ghcr.io/jango-blockchained/hoox-setup
# Version src  : packages/cli/package.json (must match git tag on release tags)
# =============================================================================

name: Build and push production image

on:
  push:
    branches:
      - main
    tags:
      - "v0.*"
      - "v1.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag (defaults to packages/cli/package.json)"
        required: false
        default: ""
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        default: "linux/amd64"

permissions:
  contents: read
  packages: write
  # Required for GHA cache (type=gha) in docker-bake.hcl
  actions: write

concurrency:
  # One in-flight publish per ref; cancel superseded main builds.
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize git submodules (core workers for Docker)
        # workers/ are git submodules — Dockerfile.prod bundles each one.
        # pine-worker/pyne-worker were removed from the repo and are not bundled.
        run: |
          git submodule update --init --recursive \
            workers/hoox \
            workers/trade-worker \
            workers/agent-worker \
            workers/d1-worker \
            workers/telegram-worker \
            workers/web3-wallet-worker \
            workers/email-worker \
            workers/analytics-worker \
            workers/report-worker \
            || echo "::warning::Some submodules could not be initialized."

      - name: Resolve version
        id: version
        shell: bash
        run: |
          PKG=$(jq -r .version packages/cli/package.json)
          PUBLISH_LATEST=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            PUBLISH_LATEST=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$PKG"
            PUBLISH_LATEST=true
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Release tag → image :<semver> + :latest
            VERSION="${GITHUB_REF_NAME#v}"
            PUBLISH_LATEST=true
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Continuous main tip → image :main (+ :sha-*) — not :latest
            VERSION="main"
            PUBLISH_LATEST=false
          else
            VERSION="$PKG"
            PUBLISH_LATEST=false
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$PUBLISH_LATEST" >> "$GITHUB_OUTPUT"
          echo "Resolved image version: $VERSION (package.json=$PKG, latest=$PUBLISH_LATEST)"

      - name: Verify tag matches package version
        # Only enforce on release tags — main/workflow_dispatch free to drift.
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.version }}"
          PKG="${{ steps.version.outputs.pkg }}"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag v$TAG does not match packages/cli/package.json version $PKG"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Bake and push production image
        uses: docker/bake-action@v6
        with:
          files: ./docker-bake.hcl
          targets: prod
          push: true
          set: |
            *.cache-from=type=gha,scope=hoox-prod
            *.cache-to=type=gha,scope=hoox-prod,mode=max
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REVISION: ${{ steps.version.outputs.revision }}
          PUBLISH_LATEST: ${{ steps.version.outputs.publish_latest }}
          PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64' }}
          REGISTRY: ghcr.io/jango-blockchained/hoox-setup
          BUN_VERSION: "1.3.14"

      - name: Set package visibility to public
        # Best-effort: GHCR images are private by default.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /user/packages/container/hoox-setup \
            -f visibility=public
