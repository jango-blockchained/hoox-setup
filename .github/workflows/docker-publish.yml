# =============================================================================
# Build and push the Hoox production Docker image to GHCR.
#
# Mirrors the trigger pattern of release.yml: fires on every v0.* / v1.* tag.
# Also accepts workflow_dispatch for manual rebuilds (useful for verifying
# the build before cutting a real release).
#
# Image source : ./Dockerfile.prod (multi-stage, oven/bun:1.3.12-alpine runtime)
# Image target : ghcr.io/jango-blockchained/hoox-setup
# Image tags   : <version>, <major>.<minor>, latest (on tag push), sha-<short>
# Version src  : packages/cli/package.json — enforced to match the git tag.
# =============================================================================

name: Build and push production image

on:
  push:
    tags:
      - "v0.*"
      - "v1.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag (defaults to packages/cli/package.json)"
        required: false
        default: ""

# GITHUB_TOKEN with `packages: write` is sufficient to push to a
# user-owned GHCR namespace (ghcr.io/jango-blockchained/*). No PAT needed.
permissions:
  contents: read
  packages: write

# Match the existing workflow concurrency style (release.yml / ci.yml).
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # workers/ are git submodules — Dockerfile.prod bundles each one
          # via `bun build workers/<name>/src/index.ts ...` in stage 1.
          submodules: recursive
          # Full history lets docker/metadata-action resolve semver tags.
          fetch-depth: 0

      - name: Read version from packages/cli/package.json
        id: version
        run: |
          VERSION=$(jq -r .version packages/cli/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        # release-process.md §2.4: the tag must match the version in
        # packages/cli/package.json. This is the canary that catches
        # the "bump the tag but forget to bump package.json" footgun.
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag v$TAG does not match packages/cli/package.json version $PKG"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jango-blockchained/hoox-setup
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_tag}}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title=hoox-setup
            org.opencontainers.image.description=Hoox self-hosted production image (multi-worker Bun.serve router)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Provenance + SBOM help supply-chain security. Both require
          # buildx >= 0.10, which docker/setup-buildx-action@v3 ensures.
          provenance: true
          sbom: true
          # GHA layer cache — fast rebuilds without committing cache to the repo.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set package visibility to public
        # Best-effort: GHCR images are private by default. Flip to public so
        # consumers can `docker pull ghcr.io/jango-blockchained/hoox-setup:...`
        # without auth. Matches the OSS posture of the npm packages.
        # `continue-on-error` so a permission hiccup doesn't fail the whole job
        # — the user can flip it manually in the GHCR UI if needed.
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /user/packages/container/hoox-setup \
            -f visibility=public
