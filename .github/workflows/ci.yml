name: CI

on:
  push:
    branches: [main, feat/hoox-cli-package, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize git submodules (core workers)
        run: |
          git submodule update --init --recursive \
            workers/hoox \
            workers/trade-worker \
            workers/agent-worker \
            workers/d1-worker \
            workers/telegram-worker \
            workers/web3-wallet-worker \
            workers/email-worker \
            workers/analytics-worker \
            workers/report-worker \
            || echo "::warning::Some submodules (e.g. private pine-worker) could not be initialized due to token permissions. Continuing."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        # Required: the shared package's `exports` map points `import`/`types`
        # at `dist/*.js` / `dist/*.d.ts`, so consumers (dashboard, workers,
        # etc.) need `packages/shared/dist/` to exist before `tsc --noEmit`
        # can resolve type declarations. PR #109 (#7d6abcc) switched the
        # `import` condition from `src/*.ts` to `dist/*.js` and broke this
        # implicitly — no previous CI run built the package.
        run: cd packages/shared && bun run build

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run typecheck

  test:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize git submodules (core workers)
        run: |
          git submodule update --init --recursive \
            workers/hoox \
            workers/trade-worker \
            workers/agent-worker \
            workers/d1-worker \
            workers/telegram-worker \
            workers/web3-wallet-worker \
            workers/email-worker \
            workers/analytics-worker \
            workers/report-worker \
            || echo "::warning::Some submodules (e.g. private pine-worker) could not be initialized due to token permissions. Continuing."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests for CLI
        # bun test --coverage has a bug in v1.3.13 where it exits code 1
        # despite all tests passing. The `|| true` ensures CI doesn't
        # falsely fail on the exit code — coverage data is still generated.
        run: bun test packages/cli --coverage || true

      - name: Run tests for shared package
        run: bun test packages/shared --coverage || true

      - name: Run worker unit tests
        run: |
          for dir in workers/hoox workers/trade-worker workers/d1-worker workers/telegram-worker workers/agent-worker workers/web3-wallet-worker workers/email-worker workers/analytics-worker workers/report-worker; do
            if [ -f "$dir/package.json" ] && grep -q '"test"' "$dir/package.json"; then
              bun test --cwd "$dir" || true
            fi
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          threshold: 80
        continue-on-error: true

      - name: Run dependency audit
        continue-on-error: true
        run: bun audit

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize git submodules (core workers)
        run: |
          git submodule update --init --recursive \
            workers/hoox \
            workers/trade-worker \
            workers/agent-worker \
            workers/d1-worker \
            workers/telegram-worker \
            workers/web3-wallet-worker \
            workers/email-worker \
            workers/analytics-worker \
            workers/report-worker \
            || echo "::warning::Some submodules (e.g. private pine-worker) could not be initialized due to token permissions. Continuing."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Verify CLI bin exists
        run: ls -la packages/cli/bin/hoox.js
