# Cloudflare Worker Configuration for web3-wallet-worker

name = "web3-wallet-worker"
main = "src/index.ts"
compatibility_date = "2023-10-30" # Update to a recent date

# Enable Node.js compatibility
# Required for some libraries like ethers.js that might use Node APIs
# node_compat = true

[vars]
# Optional: Define non-secret environment variables here
# EXAMPLE_VAR = "example_value"

# --- Secrets --- #
# Secrets are now managed via Cloudflare Secrets Store.
# 1. Create secrets in a store (e.g., using wrangler secrets-store secret create <STORE_ID> --name WALLET_PRIVATE_KEY)
# 2. Bind them below using the secrets_store_secrets array.

# --- Bindings --- #

# Example KV Namespace binding
# [[kv_namespaces]]
# binding = "MY_KV_NAMESPACE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Example Durable Object binding
# [[durable_objects.bindings]]
# name = "MY_DURABLE_OBJECT"
# class_name = "MyDurableObject"

# Example R2 Bucket binding
# [[r2_buckets]]
# binding = "MY_BUCKET"
# bucket_name = "my-bucket"

# Example D1 Database binding
# [[d1_databases]]
# binding = "DB"
# database_name = "my-database"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# Secrets Store Bindings:
secrets_store_secrets = [
  # Bind the private key secret from the store to the WALLET_PK_SECRET variable in the worker
  { binding = "WALLET_PK_SECRET", store_id= "<YOUR_STORE_ID>", secret_name = "WALLET_PRIVATE_KEY" },
  # Bind the mnemonic phrase secret from the store to the WALLET_MNEMONIC_SECRET variable
  { binding = "WALLET_MNEMONIC_SECRET", store_id= "<YOUR_STORE_ID>", secret_name = "WALLET_MNEMONIC_PHRASE" },
]

# --- Development Configuration --- #
# For local development using `wrangler dev`

[dev]
# NOTE: Unsafe bindings and .dev.vars CANNOT be used to mock Secrets Store bindings locally.
# For local development (`wrangler dev`):
# - You need to have actual secrets created in a Secrets Store (could be a dev-specific store).
# - Ensure the `store_id` and `secret_name` above match your actual dev secrets.
# - Alternatively, modify the worker code to use hardcoded test values when running locally (not recommended for production code).

# Define local overrides for bindings if needed
# Example for local KV:
# kv_namespaces = [
#   { binding = "MY_KV_NAMESPACE", preview_id = "...", id = "..." } # Use wrangler kv:namespace list to find IDs
# ]

# Add other unsafe bindings using separate [[unsafe.bindings]] blocks if needed
# e.g.
# [[unsafe.bindings]]
# name = "MY_OTHER_BINDING"
# type = "kv_namespace"

# --- .dev.vars --- #
# NOTE: This file is NO LONGER USED for providing secrets to this worker, as it uses Secrets Store bindings.
# Keeping the section commented out for informational purposes.
# # Use a `.dev.vars` file (ignored by git) to specify local secret values:
# # Create a file named `.dev.vars` in this directory with EITHER:
# # SECRETS = "{\"MNEMONIC_PHRASE\": \"your actual test mnemonic phrase here\"}"
# # OR:
# # SECRETS = "{\"PRIVATE_KEY\": \"your_actual_0x_prefixed_test_private_key_here\"}"
# # Using PRIVATE_KEY is prioritized if both are set.
# # DO NOT set both unless you intend to use the PRIVATE_KEY.
# 
# If using direct binding (not recommended with multiple secrets):
# MNEMONIC_PHRASE = "your actual test mnemonic phrase here"
# PRIVATE_KEY = "your_actual_0x_prefixed_test_private_key_here" 